<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketplace Goblin</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <h1>Marketplace Goblin</h1>
      <p class="subtitle">eBay comp capture</p>
    </header>

    <p id="page-status" class="status">Checking page…</p>

    <button id="capture-btn" type="button" class="btn btn-primary" disabled>
      Capture visible eBay comps
    </button>

    <p id="capture-meta" class="meta hidden"></p>

    <section id="preview" class="preview hidden" aria-live="polite">
      <h2>Preview</h2>
      <ul id="preview-list" class="preview-list"></ul>
    </section>

    <button id="copy-btn" type="button" class="btn btn-secondary hidden" disabled>
      Copy JSON to clipboard
    </button>

    <p id="toast" class="toast hidden" role="status"></p>

    <footer class="footer">
      Paste copied JSON into Marketplace Goblin → Comparable Sales → Paste Comp Text / JSON
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
